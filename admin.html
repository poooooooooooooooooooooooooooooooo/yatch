<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面</title>

<style>
body {
    font-family: sans-serif;
    background: #f4faff;
    padding: 20px;
}

/* タイトル */
h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* テーブル基本 */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #ccc;
    padding: 12px;
    text-align: left;
}

th {
    background: #0077cc;
    color: white;
}

/* ボタン */
button {
    padding: 10px 16px;
    background: #0077cc;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin: 5px 0;
}

button:hover {
    background: #005fa3;
}

/* スマホ対応 */
@media (max-width: 600px) {
    body {
        padding: 10px;
    }

    h1 {
        font-size: 20px;
    }

    table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
        font-size: 14px;
    }

    th, td {
        padding: 8px;
    }

    button {
        width: 100%;
        font-size: 15px;
        padding: 12px;
    }
}
</style>

<!-- Firebase 読み込み -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCqYx8Q6j0m7Y9Y6Z6Z6Z6Z6Z6Z6Z6Z6",
    authDomain: "yacht-vote.firebaseapp.com",
    projectId: "yacht-vote",
    storageBucket: "yacht-vote.appspot.com",
    messagingSenderId: "1234567890",
    appId: "1:1234567890:web:abcdef123456"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* データ読み込み */
async function loadData() {
    const tableBody = document.getElementById("data");
    tableBody.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "votes"));
    querySnapshot.forEach((docSnap) => {
        const d = docSnap.data();

        const row = `
            <tr>
                <td>${d.year}</td>
                <td>${d.name}</td>
                <td>${d.status}</td>
                <td>
                    <button onclick="deleteData('${docSnap.id}')">削除</button>
                </td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });
}

/* 削除 */
async function deleteData(id) {
    await deleteDoc(doc(db, "votes", id));
    alert("削除しました");
    loadData();
}

window.onload = loadData;
</script>

</head>
<body>

<h1>管理画面</h1>

<table>
    <thead>
        <tr>
            <th>卒業年</th>
            <th>名前</th>
            <th>参加状況</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>

</body>
</html>
